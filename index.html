<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chi Sculptor · Lee Sin</title>
<link rel="stylesheet" href="./style.css" />
<!-- Sculpt a field of chi with your bare hand. Webcam required (https / localhost).
     Static site, no build step. Edit the closing line in messages.js. -->
</head>
<body>

<div id="stage"></div>
<video id="webcam" playsinline muted></video>
<div id="flash"></div>

<div id="title"></div>
<div id="hint"></div>
<div id="closing"></div>

<div id="loader">
  <div class="spinner" id="spinner"></div>
  <div class="lmsg">The blind monk awaits</div>
  <button class="begin-btn" id="begin-btn">BEGIN</button>
  <div class="begin-hint">allow your webcam &amp; sound when asked</div>
  <div id="fallback">
    <h2>A resource could not be loaded</h2>
    <p>This pulls Three.js and MediaPipe Hands from a CDN. If a sandbox blocks
      outside requests it won't load — download the folder and open it in
      Chrome/Edge, or host it (GitHub Pages / Vercel).</p>
    <p class="err" id="fallback-err"></p>
  </div>
</div>

<script>
  window.__eyeFail = function (what) {
    var l = document.getElementById('loader'); if (l) l.style.display = 'flex';
    var sp = document.getElementById('spinner'), fb = document.getElementById('fallback'), er = document.getElementById('fallback-err');
    if (sp) sp.style.display = 'none'; if (fb) fb.style.display = 'block'; if (er && what) er.textContent = 'Failed: ' + what;
    window.__eyeFailed = true;
  };
  setTimeout(function () { if (!window.__eyeStarted && !window.__eyeFailed) window.__eyeFail('libraries did not load (network blocked?)'); }, 7000);
</script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" onerror="window.__eyeFail('MediaPipe Hands')"></script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module" src="./main.js"></script>

</body>
</html>
